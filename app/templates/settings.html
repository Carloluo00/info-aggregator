<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 24px; background: #f5f7fb; color: #1f2937; }
    form { background: #fff; padding: 16px; border: 1px solid #d1d5db; max-width: 480px; }
    label { display: block; margin: 10px 0 4px; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; }
  </style>
</head>
<body>
  <p><a href="/sources">Back to sources</a></p>
  <form method="post" action="/settings">
    <label>Max push per cycle</label>
    <input name="max_push_per_cycle" value="{{ max_push_per_cycle }}">

    <label>Summary when exceed</label>
    <select name="summary_when_exceed">
      <option value="true" {% if summary_when_exceed == "true" %}selected{% endif %}>true</option>
      <option value="false" {% if summary_when_exceed == "false" %}selected{% endif %}>false</option>
    </select>
    <br><br>
    <button type="submit">Save</button>
  </form>
</body>
</html>
